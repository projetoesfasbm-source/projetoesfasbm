databases:
  - name: sisgem-db
    databaseName: sisgem
    user: sisgem_user
    plan: free

services:
  - type: web
    name: sisgem-web
    env: python
    buildCommand: "pip install -r requirements.txt && flask db upgrade"
    startCommand: "gunicorn 'backend.app:create_app()'"
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sisgem-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      # As demais chaves (como BREVO_API_KEY) devem ser preenchidas no painel do Render
    disk:
      name: uploads-disk
      mountPath: /opt/render/project/src/static/uploads
      sizeGB: 1
