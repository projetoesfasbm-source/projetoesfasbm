{% extends "base.html" %}

{% block title %}Ativar Modo DEC - SisGEn{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card p-4 shadow-sm" style="max-width: 450px; width: 100%; border-top: 4px solid #ffc107;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark"><i class="fas fa-shield-alt text-warning"></i> Segurança DEC</h3>
            <p class="text-muted">Você está prestes a acessar o painel de controle global. Por favor, confirme sua identidade.</p>
        </div>

        <form method="POST" action="{{ url_for('auth.ativar_modo_dec') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Sua Senha de Acesso</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" required autofocus placeholder="Digite sua senha">
                </div>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-warning fw-bold text-dark">
                    Ativar Modo DEC
                </button>
                <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">
                    Cancelar e Voltar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
